    <!-- Card representing order sheet -->
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#344955"></rect>

    <!-- Inner sheet -->
    <rect x="10" y="10" width="24" height="24" rx="4" fill="#F9FAFB"></rect>

    <!-- Route line -->
    <path d="M14 26 Q20 18 30 20" stroke="#344955" stroke-width="2" fill="none" stroke-linecap="round"></path>

    <!-- Order check mark -->
